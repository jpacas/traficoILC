<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Flujo — Ingenio La Cabaña</title>
    <style>
        :root {
            --ok: #22c55e;
            --low: #f59e0b;
            --stop: #ef4444;
            --bg: #0f172a;
            --card: #1e293b;
            --border: #334155;
            --text: #e2e8f0;
            --dim: #94a3b8;
            --campo: #3b82f6;
            --vienen: #f59e0b;
            --patio: #8b5cf6;
            --plantel: #ec4899;
            --molino: #22c55e;
            --van: #6b7280;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }
        .container { max-width: 1600px; margin: 0 auto; padding: 16px 20px; }

        /* ── Header ── */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 14px;
            border-bottom: 2px solid var(--border);
            gap: 12px;
            flex-wrap: wrap;
        }
        h1 { font-size: 1.5rem; font-weight: 700; letter-spacing: -0.5px; }
        .header-info { display: flex; gap: 20px; font-size: 0.9rem; flex-wrap: wrap; }
        .info-item { display: flex; align-items: center; gap: 8px; }
        .info-label { font-weight: 600; }
        .info-value { color: var(--dim); }

        /* ── Section cards ── */
        .section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
        }
        .section h2 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 16px;
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ══════════════════════════════════════════
           HTML PIPELINE — responsive
           Desktop: row   |   Mobile: column
        ══════════════════════════════════════════ */
        .pl-row {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            gap: 4px;
        }

        .pl-node {
            flex: 1;
            min-width: 0;
            border: 2px solid var(--c, var(--dim));
            border-radius: 10px;
            padding: 14px 6px 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: rgba(0,0,0,0.15);
        }
        .pl-icon  { font-size: 1.4rem; line-height: 1; }
        .pl-label {
            font-size: 0.62rem;
            font-weight: 700;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .pl-tons {
            font-size: 1.35rem;
            font-weight: 700;
            font-family: monospace;
            color: var(--c, var(--text));
            line-height: 1.1;
        }
        .pl-unit  { font-size: 0.7rem; color: var(--dim); margin-left: 1px; }
        .pl-units { font-size: 0.75rem; color: var(--dim); }

        .pl-conn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            flex-shrink: 0;
            min-width: 50px;
            padding: 4px 0;
        }
        .pl-flow {
            font-size: 0.6rem;
            font-weight: 700;
            font-family: monospace;
            color: var(--ok);
            white-space: nowrap;
            background: rgba(34,197,94,0.1);
            border-radius: 4px;
            padding: 2px 4px;
        }
        .pl-arrow {
            font-size: 1.1rem;
            color: var(--dim);
            display: inline-block;
        }

        /* ── Frentes grid ── */
        .frentes-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px;
        }

        .frente-card {
            background: rgba(30, 41, 59, 0.5);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .frente-card:hover {
            border-color: var(--text);
            box-shadow: 0 6px 14px rgba(0,0,0,0.4);
        }
        .frente-card.expanded { grid-column: 1 / -1; }

        .frente-header {
            background: rgba(15, 23, 42, 0.8);
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .frente-title { flex: 1; min-width: 0; }
        .frente-code  { font-size: 0.75rem; color: var(--dim); font-weight: 600; margin-bottom: 2px; }
        .frente-name  { font-size: 1rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }

        .frente-badges { display: flex; gap: 8px; align-items: center; flex-shrink: 0; }

        .badge {
            display: inline-block;
            padding: 5px 10px;
            border-radius: 4px;
            font-size: 0.75rem;
            font-weight: 600;
        }
        .badge.ok   { background: rgba(34,197,94,0.2);  color: #86efac; border: 1px solid var(--ok);   }
        .badge.low  { background: rgba(245,158,11,0.2); color: #fcd34d; border: 1px solid var(--low);  }
        .badge.stop { background: rgba(239,68,68,0.2);  color: #fca5a5; border: 1px solid var(--stop); }

        .trend-badge {
            width: 32px; height: 32px;
            border-radius: 6px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1.2rem;
        }
        .trend-badge.up     { background: rgba(34,197,94,0.15);  color: var(--ok);   }
        .trend-badge.down   { background: rgba(239,68,68,0.15);  color: var(--stop); }
        .trend-badge.stable { background: rgba(245,158,11,0.15); color: var(--low);  }

        .frente-body { padding: 14px 16px; }

        .frente-flow {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 10px 12px;
            background: rgba(15,23,42,0.5);
            border-radius: 6px;
        }
        .flow-value { display: flex; flex-direction: column; gap: 1px; }
        .flow-label { font-size: 0.7rem; color: var(--dim); text-transform: uppercase; font-weight: 600; }
        .flow-number { font-size: 1.9rem; font-weight: 700; font-family: monospace; color: var(--molino); line-height: 1.1; }
        .flow-unit   { font-size: 0.8rem; color: var(--dim); }

        .flow-bar { flex: 1; margin: 0 12px; height: 7px; background: rgba(107,114,128,0.2); border-radius: 4px; overflow: hidden; }
        .flow-bar-fill { height: 100%; background: linear-gradient(90deg, var(--molino), #15803d); border-radius: 4px; transition: width 0.3s; }

        .expand-icon { font-size: 1.2rem; color: var(--dim); margin-left: 8px; transition: transform 0.3s; }
        .frente-card.expanded .expand-icon { transform: rotate(180deg); }

        /* ── Detail panel ── */
        .frente-detail {
            display: none;
            padding: 18px;
            border-top: 1px solid var(--border);
            background: rgba(15,23,42,0.3);
        }
        .frente-card.expanded .frente-detail { display: block; }

        .detail-section { margin-bottom: 22px; }
        .detail-section h3 {
            font-size: 0.82rem;
            font-weight: 600;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .detail-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .stat-box {
            background: rgba(30,41,59,0.8);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            text-align: center;
        }
        .stat-label   { font-size: 0.68rem; color: var(--dim); text-transform: uppercase; font-weight: 600; margin-bottom: 5px; letter-spacing: 0.4px; }
        .stat-value   { font-size: 1.5rem; font-weight: 700; font-family: monospace; color: var(--molino); }
        .stat-subtext { font-size: 0.72rem; color: var(--dim); margin-top: 3px; }

        /* Stage flows — 4 boxes */
        .stage-flows-grid {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 8px;
        }
        .stage-flow-box {
            background: rgba(30,41,59,0.8);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 11px 8px;
            text-align: center;
        }

        /* ── Chart ── */
        .chart-container {
            background: rgba(30,41,59,0.6);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 14px;
            height: 220px;
            display: flex;
            flex-direction: column;
        }
        .chart {
            display: flex;
            align-items: flex-end;
            justify-content: space-between;
            height: 160px;
            gap: 4px;
            flex: 1;
        }
        .chart-bar {
            flex: 1;
            background: linear-gradient(180deg, var(--molino), #15803d);
            border-radius: 2px;
            min-height: 2px;
            position: relative;
            opacity: 0.8;
            transition: opacity 0.2s;
        }
        .chart-bar:hover { opacity: 1; }
        .chart-bar-value {
            position: absolute;
            bottom: -20px;
            left: 50%;
            transform: translateX(-50%);
            font-size: 0.6rem;
            color: var(--dim);
            white-space: nowrap;
            font-family: monospace;
            font-weight: 600;
        }
        .chart-label { text-align: center; font-size: 0.72rem; color: var(--dim); margin-top: 26px; font-weight: 600; }

        footer {
            text-align: center;
            margin-top: 28px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--dim);
        }

        .error-box { background: rgba(239,68,68,0.1); border: 2px solid var(--stop); border-radius: 8px; padding: 16px; color: #fca5a5; text-align: center; margin: 20px 0; font-weight: 500; }

        /* ══════════════════════════════════════════
           RESPONSIVE — Mobile portrait
        ══════════════════════════════════════════ */
        @media (max-width: 640px) {
            /* Pipeline: stacks vertically */
            .pl-row { flex-direction: column; gap: 0; }

            .pl-node {
                flex-direction: row;
                justify-content: space-between;
                padding: 10px 14px;
                border-radius: 8px;
                gap: 10px;
                text-align: left;
            }
            .pl-node > * { flex-shrink: 0; }
            .pl-label { font-size: 0.7rem; margin-top: 2px; }
            .pl-tons  { font-size: 1.1rem; }

            .pl-conn {
                flex-direction: row;
                min-width: auto;
                justify-content: center;
                padding: 3px 14px;
                gap: 10px;
                align-self: stretch;
            }
            /* Rotate arrow → to point down */
            .pl-arrow { transform: rotate(90deg); }
        }

        @media (max-width: 768px) {
            .container { padding: 12px; }
            h1 { font-size: 1.2rem; }
            .frentes-list { grid-template-columns: 1fr; }
            .detail-stats { grid-template-columns: repeat(2, 1fr); }
            .stage-flows-grid { grid-template-columns: repeat(2, 1fr); }
            .flow-number { font-size: 1.6rem; }
            .stat-value  { font-size: 1.3rem; }
            .frente-card.expanded { grid-column: 1; }
        }

        @media (max-width: 480px) {
            .detail-stats { grid-template-columns: 1fr; }
            .frente-name  { font-size: 0.92rem; }
            .badge { padding: 4px 8px; font-size: 0.72rem; }
        }
    </style>
</head>
<body>
    <div class="container">
        <header>
            <h1>🌾 Monitor de Flujo — Ingenio La Cabaña</h1>
            <div class="header-info">
                <div class="info-item">
                    <span class="info-label">Actualizado:</span>
                    <span class="info-value" id="last-update">—</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Lecturas:</span>
                    <span class="info-value" id="reading-count">—</span>
                </div>
            </div>
        </header>

        <div class="section">
            <h2>📊 Pipeline Global — Todos los Frentes</h2>
            <div id="global-pipeline"></div>
        </div>

        <div class="section">
            <h2>🚜 Flujo por Frente</h2>
            <div class="frentes-list" id="frentes-list"></div>
        </div>

        <footer>
            <p>Monitor de Flujo de Caña — Ingenio La Cabaña | Actualización cada hora</p>
        </footer>
    </div>

    <script>
        const API_URL = '/api/data';
        const REFRESH_INTERVAL = 3600000; // 1 hora

        let flowHistory = {};

        // ── Pipeline HTML renderer (responsive: row on desktop, column on mobile) ──
        function drawPipeline(container, snapshot, stageFlows) {
            const stages = [
                { tKey: 'tcampo',   uKey: 'ucampo',   label: 'Campo',   icon: '🌾', color: 'var(--campo)',   nextFlow: 'vienen'  },
                { tKey: 'tvienen',  uKey: 'uvienen',  label: 'Vienen',  icon: '🚚', color: 'var(--vienen)',  nextFlow: 'patio'   },
                { tKey: 'tpatio',   uKey: 'upatio',   label: 'Patio',   icon: '📦', color: 'var(--patio)',   nextFlow: 'plantel' },
                { tKey: 'tplantel', uKey: 'uplantel', label: 'Plantel', icon: '🏭', color: 'var(--plantel)', nextFlow: 'molino'  },
                { tKey: 'tmoli',    uKey: 'umoli',    label: 'Molino',  icon: '⚙️', color: 'var(--molino)',  nextFlow: null      },
            ];

            const parts = stages.map((s, idx) => {
                const tons  = (snapshot[s.tKey] || 0).toFixed(0);
                const units = snapshot[s.uKey] || 0;
                const node  = `<div class="pl-node" style="--c:${s.color}">
                    <div class="pl-icon">${s.icon}</div>
                    <div>
                        <div class="pl-label">${s.label}</div>
                        <div class="pl-tons">${tons}<span class="pl-unit">t</span></div>
                        <div class="pl-units">${units}u</div>
                    </div>
                </div>`;

                if (!s.nextFlow) return node;

                const tph  = stageFlows?.[s.nextFlow]?.flow_tph;
                const conn = `<div class="pl-conn">
                    ${tph != null ? `<span class="pl-flow">${tph.toFixed(1)} t/h</span>` : ''}
                    <span class="pl-arrow">→</span>
                </div>`;
                return node + conn;
            }).join('');

            container.innerHTML = `<div class="pl-row">${parts}</div>`;
        }

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();

                for (const codigo in data.frentes) {
                    if (!flowHistory[codigo]) flowHistory[codigo] = [];
                    flowHistory[codigo].push({
                        time: new Date(data.meta.server_time),
                        flow: data.frentes[codigo].flow.current_tph || 0
                    });
                    if (flowHistory[codigo].length > 20) flowHistory[codigo].shift();
                }

                render(data);
            } catch (error) {
                console.error('Error:', error);
                document.querySelector('.section').innerHTML =
                    '<div class="error-box">❌ Error conectando con el servidor</div>';
            }
        }

        function render(data) {
            renderHeader(data.meta);
            drawPipeline(document.getElementById('global-pipeline'), data.total.snapshot, data.global_stages);
            renderFrentesList(data);
        }

        function renderHeader(meta) {
            if (!meta.last_fetch_time) return;
            const formatter = new Intl.DateTimeFormat('es-CO', {
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                timeZone: 'America/Bogota'
            });
            document.getElementById('last-update').textContent  = formatter.format(new Date(meta.last_fetch_time));
            document.getElementById('reading-count').textContent = meta.readings_count;
        }

        function renderFrentesList(data) {
            const list = document.getElementById('frentes-list');
            list.innerHTML = '';

            const sortedCodigos = Object.keys(data.frentes).sort((a, b) => {
                return (parseInt(a) || 9999) - (parseInt(b) || 9999);
            });

            const maxFlow = Math.max(...Object.values(data.frentes).map(f => f.flow.current_tph || 0), 100);

            sortedCodigos.forEach(codigo => {
                const f        = data.frentes[codigo];
                const flow     = f.flow.current_tph || 0;
                const flowWidth = Math.max(2, (flow / maxFlow) * 100);
                const history  = flowHistory[codigo] || [];
                const avgFlow  = history.length > 0
                    ? history.reduce((a, b) => a + b.flow, 0) / history.length
                    : (f.flow.avg_tph || 0);
                const diff        = flow - avgFlow;
                const diffPercent = avgFlow > 0 ? ((diff / avgFlow) * 100).toFixed(1) : 0;
                const trendClass  = f.trend === 'up' ? 'up' : f.trend === 'down' ? 'down' : 'stable';
                const trendSymbol = f.trend === 'up' ? '↑' : f.trend === 'down' ? '↓' : '→';

                // Stage flow boxes
                const stageBoxes = [
                    { key: 'vienen',  label: 'Campo → Vienen',   color: 'var(--vienen)'  },
                    { key: 'patio',   label: 'Vienen → Patio',   color: 'var(--patio)'   },
                    { key: 'plantel', label: 'Patio → Plantel',  color: 'var(--plantel)' },
                    { key: 'molino',  label: 'Plantel → Molino', color: 'var(--molino)'  },
                ].map(s => {
                    const tph = f.stages?.[s.key]?.flow_tph ?? null;
                    return `<div class="stage-flow-box" style="border-left:3px solid ${s.color}">
                        <div class="stat-label">${s.label}</div>
                        <div class="stat-value" style="color:${tph !== null && tph > 0 ? s.color : 'var(--dim)'}">
                            ${tph !== null ? tph.toFixed(1) : '—'}
                        </div>
                        <div class="stat-subtext">t/h</div>
                    </div>`;
                }).join('');

                const card = document.createElement('div');
                card.className = 'frente-card';
                card.innerHTML = `
                    <div class="frente-header">
                        <div class="frente-title">
                            <div class="frente-code">[${codigo}]</div>
                            <div class="frente-name">${f.nombre}</div>
                        </div>
                        <div class="frente-badges">
                            <div class="badge ${f.status}">${f.status.toUpperCase()}</div>
                            <div class="trend-badge ${trendClass}">${trendSymbol}</div>
                        </div>
                    </div>

                    <div class="frente-body">
                        <div class="frente-flow">
                            <div class="flow-value">
                                <div class="flow-label">Flujo al Molino</div>
                                <div class="flow-number">${flow.toFixed(0)}</div>
                                <div class="flow-unit">t/h</div>
                            </div>
                            <div class="flow-bar">
                                <div class="flow-bar-fill" style="width:${flowWidth}%"></div>
                            </div>
                            <div class="expand-icon">▼</div>
                        </div>
                    </div>

                    <div class="frente-detail">
                        <div class="detail-section">
                            <h3>Pipeline del Frente</h3>
                            <div class="frente-pipeline"></div>
                        </div>

                        <div class="detail-section">
                            <h3>Flujos de Transporte — Balance de Masa (t/h)</h3>
                            <div class="stage-flows-grid">${stageBoxes}</div>
                        </div>

                        <div class="detail-section">
                            <h3>Flujo Molino — Actual vs Promedio</h3>
                            <div class="detail-stats">
                                <div class="stat-box">
                                    <div class="stat-label">Actual</div>
                                    <div class="stat-value">${flow.toFixed(1)}</div>
                                    <div class="stat-subtext">t/h</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-label">Promedio</div>
                                    <div class="stat-value">${(f.flow.avg_tph || 0).toFixed(1)}</div>
                                    <div class="stat-subtext">${f.flow.history_points} lecturas</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-label">Diferencia</div>
                                    <div class="stat-value" style="color:${diff >= 0 ? 'var(--ok)' : 'var(--stop)'}">
                                        ${diff >= 0 ? '+' : ''}${diff.toFixed(1)}
                                    </div>
                                    <div class="stat-subtext">(${diffPercent}%)</div>
                                </div>
                            </div>
                        </div>

                        <div class="detail-section">
                            <h3>Tendencia — Últimas ${history.length} Lecturas</h3>
                            <div class="chart-container">
                                <div class="chart" id="chart-${codigo}"></div>
                                <div class="chart-label">Tiempo →</div>
                            </div>
                        </div>
                    </div>
                `;

                card.addEventListener('click', () => {
                    card.classList.toggle('expanded');
                    if (card.classList.contains('expanded')) {
                        // Pipeline del frente
                        const pipelineEl = card.querySelector('.frente-pipeline');
                        if (pipelineEl && !pipelineEl.dataset.drawn) {
                            drawPipeline(pipelineEl, f.snapshot, f.stages);
                            pipelineEl.dataset.drawn = '1';
                        }
                        // Gráfica de tendencia
                        const chartEl = card.querySelector(`#chart-${codigo}`);
                        if (chartEl && !chartEl.dataset.drawn && history.length > 0) {
                            const maxH = Math.max(...history.map(h => h.flow), avgFlow * 1.2, 1);
                            chartEl.innerHTML = history.map(h => {
                                const barH = Math.max(2, (h.flow / maxH) * 150);
                                return `<div class="chart-bar" style="height:${barH}px">
                                    <div class="chart-bar-value">${h.flow.toFixed(0)}</div>
                                </div>`;
                            }).join('');
                            chartEl.dataset.drawn = '1';
                        }
                    }
                });

                list.appendChild(card);
            });
        }

        window.addEventListener('load', () => {
            fetchData();
            setInterval(fetchData, REFRESH_INTERVAL);
        });
    </script>
</body>
</html>
