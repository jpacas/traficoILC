<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Monitor de Flujo — Ingenio La Cabaña</title>
    <style>
        :root {
            --ok:          #16a34a;
            --low:         #d97706;
            --stop:        #dc2626;
            --bg:          #eef4ee;
            --card:        #ffffff;
            --border:      #c3d9c3;
            --text:        #1a2e1a;
            --dim:         #4a6b4a;
            --header-bg:   #1a5c38;
            --header-text: #ffffff;
            --campo:       #2563eb;
            --vienen:      #d97706;
            --patio:       #7c3aed;
            --plantel:     #db2777;
            --molino:      #16a34a;
            --van:         #6b7280;
            --accent:      #f5a623;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; }
        html, body { height: 100%; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
            background: var(--bg);
            color: var(--text);
            line-height: 1.5;
        }
        .container { max-width: 1600px; margin: 0 auto; padding: 0 20px 24px; }

        /* ── Header ── */
        header {
            background: var(--header-bg);
            color: var(--header-text);
            padding: 14px 20px;
            margin-bottom: 20px;
        }
        .header-inner {
            max-width: 1600px;
            margin: 0 auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 12px;
            flex-wrap: wrap;
        }
        h1 { font-size: 1.4rem; font-weight: 700; letter-spacing: -0.5px; color: var(--header-text); }
        .header-info { display: flex; gap: 20px; font-size: 0.9rem; flex-wrap: wrap; }
        .info-item { display: flex; align-items: center; gap: 6px; }
        .info-label { font-weight: 600; color: rgba(255,255,255,0.75); }
        .info-value { color: #ffffff; }

        /* ── Section cards ── */
        .section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(26,92,56,0.07);
        }
        .section h2 {
            font-size: 1.05rem;
            font-weight: 600;
            margin-bottom: 16px;
            color: var(--header-bg);
            display: flex;
            align-items: center;
            gap: 8px;
        }

        /* ══════════════════════════════════════════
           HTML PIPELINE — responsive
        ══════════════════════════════════════════ */
        .pl-row {
            display: flex;
            flex-direction: row;
            align-items: stretch;
            gap: 4px;
        }
        .pl-node {
            flex: 1;
            min-width: 0;
            border: 2px solid var(--c, var(--border));
            border-radius: 10px;
            padding: 14px 6px 10px;
            text-align: center;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 4px;
            background: rgba(255,255,255,0.7);
        }
        .pl-icon  { font-size: 1.4rem; line-height: 1; }
        .pl-label {
            font-size: 0.62rem;
            font-weight: 700;
            color: var(--dim);
            text-transform: uppercase;
            letter-spacing: 0.4px;
        }
        .pl-tons {
            font-size: 1.35rem;
            font-weight: 700;
            font-family: monospace;
            color: var(--c, var(--text));
            line-height: 1.1;
        }
        .pl-unit  { font-size: 0.7rem; color: var(--dim); margin-left: 1px; }
        .pl-units { font-size: 0.75rem; color: var(--dim); }
        .pl-conn {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            gap: 3px;
            flex-shrink: 0;
            min-width: 50px;
            padding: 4px 0;
        }
        .pl-flow {
            font-size: 0.6rem;
            font-weight: 700;
            font-family: monospace;
            color: var(--ok);
            white-space: nowrap;
            background: rgba(22,163,74,0.1);
            border-radius: 4px;
            padding: 2px 4px;
        }
        .pl-arrow {
            font-size: 1.1rem;
            color: var(--dim);
            display: inline-block;
        }

        /* ── Frentes grid ── */
        .frentes-list {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: 14px;
        }

        .frente-card {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 8px;
            overflow: hidden;
            cursor: pointer;
            transition: border-color 0.2s, box-shadow 0.2s;
            box-shadow: 0 1px 3px rgba(26,92,56,0.06);
        }
        .frente-card:hover {
            border-color: var(--header-bg);
            box-shadow: 0 4px 12px rgba(26,92,56,0.15);
        }
        .frente-card.expanded { grid-column: 1 / -1; }

        .frente-card.inactive {
            border-color: var(--stop);
            background: rgba(220,38,38,0.04);
        }
        .frente-card.inactive:hover {
            border-color: #b91c1c;
            box-shadow: 0 4px 12px rgba(220,38,38,0.15);
        }

        .frente-header {
            background: rgba(238,244,238,0.8);
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
            display: flex;
            justify-content: space-between;
            align-items: center;
            gap: 8px;
        }
        .frente-card.inactive .frente-header {
            background: rgba(220,38,38,0.06);
            border-bottom-color: rgba(220,38,38,0.2);
        }
        .frente-title { flex: 1; min-width: 0; }
        .frente-code  { font-size: 0.75rem; color: var(--dim); font-weight: 600; margin-bottom: 2px; }
        .frente-name  { font-size: 1rem; font-weight: 700; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; color: var(--text); }

        .frente-badges { display: flex; gap: 6px; align-items: center; flex-shrink: 0; flex-wrap: wrap; }

        .badge {
            display: inline-block;
            padding: 4px 9px;
            border-radius: 4px;
            font-size: 0.72rem;
            font-weight: 700;
        }
        .badge.ok     { background: rgba(22,163,74,0.12);  color: #15803d; border: 1px solid rgba(22,163,74,0.4);   }
        .badge.low    { background: rgba(217,119,6,0.12);  color: #b45309; border: 1px solid rgba(217,119,6,0.4);   }
        .badge.stop   { background: rgba(220,38,38,0.12);  color: #b91c1c; border: 1px solid rgba(220,38,38,0.4);   }
        .badge.unknown{ background: rgba(107,114,128,0.1); color: var(--dim); border: 1px solid rgba(107,114,128,0.3); }
        .badge-inactive {
            background: var(--stop);
            color: #fff;
            font-size: 0.68rem;
            font-weight: 700;
            padding: 3px 7px;
            border-radius: 4px;
            letter-spacing: 0.3px;
        }

        .trend-badge {
            width: 28px; height: 28px;
            border-radius: 5px;
            display: flex; align-items: center; justify-content: center;
            font-weight: 700; font-size: 1rem;
        }
        .trend-badge.up     { background: rgba(22,163,74,0.12);  color: var(--ok);   }
        .trend-badge.down   { background: rgba(220,38,38,0.12);  color: var(--stop); }
        .trend-badge.stable { background: rgba(217,119,6,0.12);  color: var(--low);  }

        /* trend_3h badge */
        .trend3h-badge {
            font-size: 0.65rem;
            font-weight: 700;
            padding: 2px 6px;
            border-radius: 4px;
            white-space: nowrap;
        }
        .trend3h-badge.rising  { background: rgba(22,163,74,0.12);  color: #15803d; border: 1px solid rgba(22,163,74,0.3); }
        .trend3h-badge.falling { background: rgba(220,38,38,0.12);  color: #b91c1c; border: 1px solid rgba(220,38,38,0.3); }
        .trend3h-badge.stable  { background: rgba(217,119,6,0.12);  color: #b45309; border: 1px solid rgba(217,119,6,0.3); }

        .frente-body { padding: 14px 16px 4px; }

        .expand-icon { font-size: 1rem; color: var(--dim); transition: transform 0.3s; flex-shrink: 0; }
        .frente-card.expanded .expand-icon { transform: rotate(180deg); }

        /* ── Stage flow grid (main card content) ── */
        .stage-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 6px;
            margin-bottom: 10px;
        }
        .stage-item {
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 2px;
            padding: 8px 4px;
            border-radius: 8px;
            border: 1px solid;
            text-align: center;
        }
        .stage-item-campo   { color: var(--campo);   background: rgba(37,99,235,0.07);  border-color: rgba(37,99,235,0.2); }
        .stage-item-vienen  { color: var(--vienen);  background: rgba(217,119,6,0.07);  border-color: rgba(217,119,6,0.2); }
        .stage-item-patio   { color: var(--patio);   background: rgba(124,58,237,0.07); border-color: rgba(124,58,237,0.2); }
        .stage-item-plantel { color: var(--plantel); background: rgba(219,39,119,0.07); border-color: rgba(219,39,119,0.2); }
        .stage-item-molino  { color: var(--molino);  background: rgba(22,163,74,0.07);  border-color: rgba(22,163,74,0.2); }
        .stage-item-label {
            font-size: 0.6rem;
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: 0.3px;
            opacity: 0.75;
        }
        .stage-item-value {
            font-size: 1.05rem;
            font-weight: 700;
            font-family: monospace;
            line-height: 1.1;
        }
        .stage-item-unit {
            font-size: 0.6rem;
            opacity: 0.65;
        }

        /* ── Trend row (below stage grid) ── */
        .trend-row {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 6px 0 10px;
            border-top: 1px solid var(--border);
            margin-top: 2px;
        }
        .trend-row-label {
            font-size: 0.7rem;
            color: var(--dim);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        /* ── Detail panel ── */
        .frente-detail {
            display: none;
            padding: 18px;
            border-top: 1px solid var(--border);
            background: rgba(238,244,238,0.3);
        }
        .frente-card.expanded .frente-detail { display: block; }

        .detail-section { margin-bottom: 22px; }
        .detail-section h3 {
            font-size: 0.8rem;
            font-weight: 700;
            color: var(--dim);
            text-transform: uppercase;
            margin-bottom: 10px;
            letter-spacing: 0.5px;
        }

        .detail-stats {
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            gap: 10px;
        }
        .stat-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 12px;
            text-align: center;
        }
        .stat-label   { font-size: 0.68rem; color: var(--dim); text-transform: uppercase; font-weight: 600; margin-bottom: 5px; letter-spacing: 0.4px; }
        .stat-value   { font-size: 1.5rem; font-weight: 700; font-family: monospace; color: var(--molino); }
        .stat-subtext { font-size: 0.72rem; color: var(--dim); margin-top: 3px; }

        .stage-flows-grid {
            display: grid;
            grid-template-columns: repeat(5, 1fr);
            gap: 8px;
        }
        .stage-flow-box {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 6px;
            padding: 11px 8px;
            text-align: center;
        }

        /* ── 24h History Chart ── */
        .history-section {
            background: var(--card);
            border: 1px solid var(--border);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 20px;
            box-shadow: 0 1px 4px rgba(26,92,56,0.07);
        }
        .history-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 16px;
            gap: 12px;
            flex-wrap: wrap;
        }
        .history-header h2 {
            font-size: 1.05rem;
            font-weight: 600;
            color: var(--header-bg);
            display: flex;
            align-items: center;
            gap: 8px;
        }
        .history-controls { display: flex; gap: 8px; align-items: center; flex-wrap: wrap; }
        .history-select {
            padding: 6px 12px;
            border: 1px solid var(--border);
            border-radius: 6px;
            background: var(--card);
            color: var(--text);
            font-size: 0.85rem;
            cursor: pointer;
        }
        .svg-chart-wrap {
            width: 100%;
            overflow-x: auto;
        }
        svg.history-chart {
            display: block;
            width: 100%;
            min-width: 400px;
            height: 220px;
        }
        .chart-no-data {
            text-align: center;
            color: var(--dim);
            padding: 40px;
            font-size: 0.9rem;
        }

        footer {
            text-align: center;
            margin-top: 8px;
            padding-top: 14px;
            border-top: 1px solid var(--border);
            font-size: 0.8rem;
            color: var(--dim);
        }

        .error-box {
            background: rgba(220,38,38,0.08);
            border: 2px solid var(--stop);
            border-radius: 8px;
            padding: 16px;
            color: #b91c1c;
            text-align: center;
            margin: 20px 0;
            font-weight: 500;
        }

        /* ══════════════════════════════════════════
           RESPONSIVE — TABLET ≤768px
        ══════════════════════════════════════════ */
        @media (max-width: 768px) {
            .container  { padding: 0 10px 16px; }
            header      { padding: 10px 12px; margin-bottom: 14px; }
            h1          { font-size: 1.08rem; }
            .header-info { gap: 14px; font-size: 0.83rem; }

            .section         { padding: 14px; margin-bottom: 14px; border-radius: 10px; }
            .section h2      { font-size: 0.95rem; margin-bottom: 12px; }
            .history-section { padding: 14px; margin-bottom: 14px; border-radius: 10px; }

            /* Pipeline: horizontal scroll — compact, swipeable */
            .pl-row {
                flex-direction: row;
                overflow-x: auto;
                -webkit-overflow-scrolling: touch;
                gap: 4px;
                padding-bottom: 6px;
            }
            .pl-row::-webkit-scrollbar { height: 3px; }
            .pl-row::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }
            .pl-node  { min-width: 90px; flex: 0 0 90px; padding: 10px 5px 8px; }
            .pl-conn  { min-width: 32px; flex-shrink: 0; }
            .pl-tons  { font-size: 1.05rem; }
            .pl-arrow { transform: none; } /* keep → pointing right */

            .frentes-list   { grid-template-columns: 1fr; gap: 10px; }
            .frente-card.expanded { grid-column: 1; }

            .stage-item-value  { font-size: 0.9rem; }
            .detail-stats      { grid-template-columns: repeat(2, 1fr); }
            .stage-flows-grid  { grid-template-columns: repeat(2, 1fr); }
            .stat-value        { font-size: 1.25rem; }
        }

        /* ══════════════════════════════════════════
           RESPONSIVE — MOBILE ≤480px
        ══════════════════════════════════════════ */
        @media (max-width: 480px) {
            .container   { padding: 0 8px 12px; }
            header       { padding: 8px 10px; }
            .header-inner { gap: 4px; }
            h1           { font-size: 0.92rem; letter-spacing: -0.3px; }
            .header-info { gap: 10px; font-size: 0.78rem; }

            .section         { padding: 10px; margin-bottom: 10px; border-radius: 8px; }
            .section h2      { font-size: 0.86rem; margin-bottom: 10px; }
            .history-section { padding: 10px; margin-bottom: 10px; border-radius: 8px; }
            .history-header  { flex-direction: column; align-items: stretch; gap: 8px; }
            .history-header h2 { font-size: 0.86rem; }
            .history-controls { width: 100%; }
            .history-select  { width: 100%; font-size: 0.82rem; }
            svg.history-chart { min-width: 300px; height: 170px; }

            /* Pipeline nodes slightly narrower */
            .pl-node { min-width: 78px; flex: 0 0 78px; padding: 8px 4px 6px; }
            .pl-conn { min-width: 26px; }
            .pl-tons { font-size: 0.95rem; }
            .pl-icon { font-size: 1.15rem; }
            .pl-label { font-size: 0.58rem; }
            .pl-units { font-size: 0.68rem; }
            .pl-flow  { font-size: 0.55rem; padding: 1px 3px; }

            /* Cards */
            .frente-header { padding: 10px 11px; }
            .frente-code   { font-size: 0.68rem; }
            .frente-name   { font-size: 0.88rem; }
            .frente-body   { padding: 10px 11px 4px; }
            .badge         { padding: 3px 7px; font-size: 0.67rem; }
            .badge-inactive { font-size: 0.62rem; padding: 2px 6px; }

            /* Stage grid: 3 cols → 5 items = 3+2 rows */
            .stage-grid        { grid-template-columns: repeat(3, 1fr); gap: 5px; margin-bottom: 8px; }
            .stage-item        { padding: 7px 3px; border-radius: 6px; }
            .stage-item-label  { font-size: 0.55rem; }
            .stage-item-value  { font-size: 0.82rem; }
            .stage-item-unit   { font-size: 0.53rem; }

            .trend-row       { padding: 5px 0 8px; }
            .trend-row-label { font-size: 0.62rem; }
            .trend3h-badge   { font-size: 0.6rem; padding: 2px 5px; }
            .expand-icon     { font-size: 0.9rem; }

            /* Detail panel */
            .frente-detail   { padding: 10px; }
            .detail-section  { margin-bottom: 14px; }
            .detail-section h3 { font-size: 0.7rem; margin-bottom: 8px; }
            .detail-stats    { grid-template-columns: repeat(2, 1fr); gap: 7px; }
            .stage-flows-grid { grid-template-columns: repeat(3, 1fr); gap: 6px; }
            .stage-flow-box  { padding: 9px 5px; }
            .stat-box        { padding: 9px 6px; }
            .stat-label      { font-size: 0.6rem; margin-bottom: 3px; }
            .stat-value      { font-size: 1.1rem; }
            .stat-subtext    { font-size: 0.62rem; }

            footer { font-size: 0.72rem; padding-top: 10px; }
        }
    </style>
</head>
<body>
    <header>
        <div class="header-inner">
            <h1>Monitor de Flujo — Ingenio La Cabaña</h1>
            <div class="header-info">
                <div class="info-item">
                    <span class="info-label">Actualizado:</span>
                    <span class="info-value" id="last-update">—</span>
                </div>
                <div class="info-item">
                    <span class="info-label">Lecturas:</span>
                    <span class="info-value" id="reading-count">—</span>
                </div>
            </div>
        </div>
    </header>

    <div class="container">
        <div class="section">
            <h2>Pipeline Global — Todos los Frentes</h2>
            <div id="global-pipeline"></div>
        </div>

        <div class="section">
            <h2>Flujo por Frente</h2>
            <div class="frentes-list" id="frentes-list"></div>
        </div>

        <div class="history-section">
            <div class="history-header">
                <h2>Tendencia 24 Horas — Flujo al Molino</h2>
                <div class="history-controls">
                    <select class="history-select" id="history-frente-select">
                        <option value="__global__">Global (Todos)</option>
                    </select>
                </div>
            </div>
            <div id="history-chart-area"><div class="chart-no-data">Cargando datos históricos...</div></div>
        </div>

        <footer>
            <p>Monitor de Flujo de Caña — Ingenio La Cabaña | Actualización cada 5 minutos</p>
        </footer>
    </div>

    <script>
        const API_URL         = '/api/data';
        const HISTORY_API_URL = '/api/history';
        const REFRESH_INTERVAL = 300000; // 5 minutos

        let historyData = [];
        let frentesIndex = {};  // codigo → nombre

        // ── Pipeline HTML renderer ──
        function drawPipeline(container, snapshot, stageFlows) {
            const stages = [
                { tKey: 'tcampo',   uKey: 'ucampo',   label: 'Campo',   icon: '🌾', color: 'var(--campo)',   nextFlow: 'vienen'  },
                { tKey: 'tvienen',  uKey: 'uvienen',  label: 'Vienen',  icon: '🚚', color: 'var(--vienen)',  nextFlow: 'patio'   },
                { tKey: 'tpatio',   uKey: 'upatio',   label: 'Patio',   icon: '📦', color: 'var(--patio)',   nextFlow: 'plantel' },
                { tKey: 'tplantel', uKey: 'uplantel', label: 'Plantel', icon: '🏭', color: 'var(--plantel)', nextFlow: 'molino'  },
                { tKey: 'tmoli',    uKey: 'umoli',    label: 'Molino',  icon: '⚙️', color: 'var(--molino)',  nextFlow: null      },
            ];

            const parts = stages.map(s => {
                const tons  = (snapshot[s.tKey] || 0).toFixed(0);
                const units = snapshot[s.uKey] || 0;
                const node  = `<div class="pl-node" style="--c:${s.color}">
                    <div class="pl-icon">${s.icon}</div>
                    <div>
                        <div class="pl-label">${s.label}</div>
                        <div class="pl-tons">${tons}<span class="pl-unit">t</span></div>
                        <div class="pl-units">${units}u</div>
                    </div>
                </div>`;

                if (!s.nextFlow) return node;

                const tph  = stageFlows?.[s.nextFlow]?.flow_tph;
                const conn = `<div class="pl-conn">
                    ${tph != null ? `<span class="pl-flow">${tph.toFixed(1)} t/h</span>` : ''}
                    <span class="pl-arrow">→</span>
                </div>`;
                return node + conn;
            }).join('');

            container.innerHTML = `<div class="pl-row">${parts}</div>`;
        }

        // ── Status label (español) ──
        function statusLabel(status) {
            return { ok: 'ACTIVO', low: 'BAJO', stop: 'PARADO', unknown: 'SIN DATOS' }[status] || status.toUpperCase();
        }

        // ── Stage flow grid ──
        function renderStageGrid(stages) {
            const stageList = [
                { key: 'campo',   label: 'Campo',   cls: 'stage-item-campo'   },
                { key: 'vienen',  label: 'Vienen',  cls: 'stage-item-vienen'  },
                { key: 'plantel', label: 'Plantel', cls: 'stage-item-plantel' },
                { key: 'patio',   label: 'Patio',   cls: 'stage-item-patio'   },
                { key: 'molino',  label: 'Molino',  cls: 'stage-item-molino'  },
            ];
            return stageList.map(s => {
                const tph = stages?.[s.key]?.flow_tph;
                const val = tph != null ? tph.toFixed(0) : '—';
                return `<div class="stage-item ${s.cls}">
                    <span class="stage-item-label">${s.label}</span>
                    <span class="stage-item-value">${val}</span>
                    <span class="stage-item-unit">t/h</span>
                </div>`;
            }).join('');
        }

        // ── Trend_3h badge ──
        function renderTrend3h(trend3h) {
            if (!trend3h || trend3h === 'unknown') return '<span style="color:var(--dim);font-size:0.7rem;">—</span>';
            const labels = { rising: '↑ Subiendo', falling: '↓ Bajando', stable: '→ Estable' };
            return `<span class="trend3h-badge ${trend3h}">${labels[trend3h] || trend3h}</span>`;
        }

        async function fetchData() {
            try {
                const response = await fetch(API_URL);
                if (!response.ok) throw new Error(`HTTP ${response.status}`);
                const data = await response.json();
                render(data);
            } catch (error) {
                console.error('Error:', error);
                document.getElementById('frentes-list').innerHTML =
                    '<div class="error-box">Error conectando con el servidor</div>';
            }
        }

        async function fetchHistory() {
            try {
                const response = await fetch(HISTORY_API_URL);
                if (!response.ok) return;
                historyData = await response.json();
                renderHistoryChart();
            } catch (e) {
                console.error('Error history:', e);
            }
        }

        function render(data) {
            renderHeader(data.meta);
            drawPipeline(document.getElementById('global-pipeline'), data.total.snapshot, data.global_stages);
            renderFrentesList(data);
            updateHistorySelect(data.frentes);
        }

        function renderHeader(meta) {
            if (!meta.last_fetch_time) return;
            const formatter = new Intl.DateTimeFormat('es-SV', {
                hour: '2-digit', minute: '2-digit', second: '2-digit',
                timeZone: 'America/El_Salvador'
            });
            document.getElementById('last-update').textContent   = formatter.format(new Date(meta.last_fetch_time));
            document.getElementById('reading-count').textContent = meta.readings_count;
        }

        function updateHistorySelect(frentes) {
            const select = document.getElementById('history-frente-select');
            const current = select.value;
            // rebuild options preserving selection
            const options = ['<option value="__global__">Global (Todos)</option>'];
            Object.entries(frentes).sort((a, b) => (parseInt(a[0]) || 9999) - (parseInt(b[0]) || 9999)).forEach(([c, f]) => {
                frentesIndex[c] = f.nombre;
                const sel = current === c ? ' selected' : '';
                options.push(`<option value="${c}"${sel}>[${c}] ${f.nombre}</option>`);
            });
            select.innerHTML = options.join('');
        }

        function renderFrentesList(data) {
            const list = document.getElementById('frentes-list');
            list.innerHTML = '';

            const entries = Object.entries(data.frentes)
                .sort((a, b) => (parseInt(a[0]) || 9999) - (parseInt(b[0]) || 9999));

            // Active first, inactive last
            const active   = entries.filter(([, f]) => !f.inactive);
            const inactive = entries.filter(([, f]) => f.inactive);
            const sorted   = [...active, ...inactive];

            sorted.forEach(([codigo, f]) => {
                const flow    = f.flow.current_tph || 0;
                const avgFlow = f.flow.avg_tph || 0;
                const diff    = flow - avgFlow;

                // Stage flow boxes (detail)
                const stageBoxes = [
                    { key: 'campo',   label: 'Campo',   color: 'var(--campo)'   },
                    { key: 'vienen',  label: 'Vienen',  color: 'var(--vienen)'  },
                    { key: 'plantel', label: 'Plantel', color: 'var(--plantel)' },
                    { key: 'patio',   label: 'Patio',   color: 'var(--patio)'   },
                    { key: 'molino',  label: 'Molino',  color: 'var(--molino)'  },
                ].map(s => {
                    const tph = f.stages?.[s.key]?.flow_tph ?? null;
                    return `<div class="stage-flow-box" style="border-top:3px solid ${s.color}">
                        <div class="stat-label">${s.label}</div>
                        <div class="stat-value" style="color:${tph !== null && tph > 0 ? s.color : 'var(--dim)'}">
                            ${tph !== null ? tph.toFixed(1) : '—'}
                        </div>
                        <div class="stat-subtext">t/h</div>
                    </div>`;
                }).join('');

                const card = document.createElement('div');
                card.className = 'frente-card' + (f.inactive ? ' inactive' : '');
                card.innerHTML = `
                    <div class="frente-header">
                        <div class="frente-title">
                            <div class="frente-code">[${codigo}]</div>
                            <div class="frente-name">${f.nombre}</div>
                        </div>
                        <div class="frente-badges">
                            ${f.inactive ? '<span class="badge-inactive">INACTIVO</span>' : ''}
                            <div class="badge ${f.status}">${statusLabel(f.status)}</div>
                        </div>
                    </div>

                    <div class="frente-body">
                        <div class="stage-grid">
                            ${renderStageGrid(f.stages)}
                        </div>
                        <div class="trend-row">
                            <span class="trend-row-label">Tendencia 3h</span>
                            <div style="display:flex;align-items:center;gap:8px;">
                                ${renderTrend3h(f.trend_3h)}
                                <span class="expand-icon">▼</span>
                            </div>
                        </div>
                    </div>

                    <div class="frente-detail">
                        <div class="detail-section">
                            <h3>Pipeline del Frente</h3>
                            <div class="frente-pipeline"></div>
                        </div>

                        <div class="detail-section">
                            <h3>Flujos por Etapa — Balance de Masa (t/h)</h3>
                            <div class="stage-flows-grid">${stageBoxes}</div>
                        </div>

                        <div class="detail-section">
                            <h3>Flujo Molino — Actual vs Promedio</h3>
                            <div class="detail-stats">
                                <div class="stat-box">
                                    <div class="stat-label">Actual (1h)</div>
                                    <div class="stat-value">${flow.toFixed(1)}</div>
                                    <div class="stat-subtext">t/h</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-label">Promedio histórico</div>
                                    <div class="stat-value">${avgFlow.toFixed(1)}</div>
                                    <div class="stat-subtext">${f.flow.history_points} lecturas</div>
                                </div>
                                <div class="stat-box">
                                    <div class="stat-label">Diferencia</div>
                                    <div class="stat-value" style="color:${diff >= 0 ? 'var(--ok)' : 'var(--stop)'}">
                                        ${diff >= 0 ? '+' : ''}${diff.toFixed(1)}
                                    </div>
                                    <div class="stat-subtext">vs promedio</div>
                                </div>
                            </div>
                        </div>
                    </div>
                `;

                card.addEventListener('click', () => {
                    card.classList.toggle('expanded');
                    if (card.classList.contains('expanded')) {
                        const pipelineEl = card.querySelector('.frente-pipeline');
                        if (pipelineEl && !pipelineEl.dataset.drawn) {
                            drawPipeline(pipelineEl, f.snapshot, f.stages);
                            pipelineEl.dataset.drawn = '1';
                        }
                    }
                });

                list.appendChild(card);
            });
        }

        // ── 24h SVG Chart ──
        function renderHistoryChart() {
            const frente = document.getElementById('history-frente-select').value;
            const area   = document.getElementById('history-chart-area');

            if (!historyData || historyData.length < 2) {
                area.innerHTML = '<div class="chart-no-data">No hay suficientes datos históricos aún</div>';
                return;
            }

            const points = historyData.map(d => ({
                time: new Date(d.time),
                flow: frente === '__global__' ? d.total_flow : (d.frentes[frente] ?? null)
            })).filter(p => p.flow !== null);

            if (points.length < 2) {
                area.innerHTML = '<div class="chart-no-data">Sin datos para este frente en las últimas 24h</div>';
                return;
            }

            const W = 800, H = 180, PAD = { top: 16, right: 16, bottom: 36, left: 50 };
            const chartW = W - PAD.left - PAD.right;
            const chartH = H - PAD.top  - PAD.bottom;

            const times = points.map(p => p.time.getTime());
            const flows = points.map(p => p.flow);
            const tMin  = Math.min(...times);
            const tMax  = Math.max(...times);
            const fMax  = Math.max(...flows, 1);
            const fAvg  = flows.reduce((a, b) => a + b, 0) / flows.length;

            const tx = t => PAD.left + ((t - tMin) / (tMax - tMin || 1)) * chartW;
            const ty = f => PAD.top  + (1 - f / fMax) * chartH;

            // Polyline coords
            const pts = points.map(p => `${tx(p.time.getTime()).toFixed(1)},${ty(p.flow).toFixed(1)}`).join(' ');

            // Area path
            const first = points[0], last = points[points.length - 1];
            const areaPath = `M${tx(first.time.getTime()).toFixed(1)},${(PAD.top + chartH).toFixed(1)} ` +
                points.map(p => `L${tx(p.time.getTime()).toFixed(1)},${ty(p.flow).toFixed(1)}`).join(' ') +
                ` L${tx(last.time.getTime()).toFixed(1)},${(PAD.top + chartH).toFixed(1)} Z`;

            // X axis tick marks — every 2 hours
            const xTicks = [];
            const startHour = new Date(tMin);
            startHour.setMinutes(0, 0, 0);
            startHour.setHours(startHour.getHours() + 2);
            for (let t = startHour.getTime(); t <= tMax; t += 2 * 3600 * 1000) {
                const x = tx(t);
                if (x >= PAD.left && x <= PAD.left + chartW) {
                    const label = new Intl.DateTimeFormat('es-SV', { hour: '2-digit', minute: '2-digit', timeZone: 'America/El_Salvador' }).format(new Date(t));
                    xTicks.push({ x, label });
                }
            }

            // Y axis ticks — 4 ticks
            const yTicks = [0, 0.25, 0.5, 0.75, 1.0].map(r => ({
                y: ty(fMax * r),
                label: (fMax * r).toFixed(0)
            }));

            const color = frente === '__global__' ? 'var(--molino)' : 'var(--campo)';

            const svg = `<svg class="history-chart" viewBox="0 0 ${W} ${H}" xmlns="http://www.w3.org/2000/svg">
                <defs>
                    <linearGradient id="chartGrad" x1="0" y1="0" x2="0" y2="1">
                        <stop offset="0%" stop-color="${color}" stop-opacity="0.25"/>
                        <stop offset="100%" stop-color="${color}" stop-opacity="0.03"/>
                    </linearGradient>
                </defs>

                <!-- Y grid lines -->
                ${yTicks.map(t => `<line x1="${PAD.left}" y1="${t.y.toFixed(1)}" x2="${PAD.left + chartW}" y2="${t.y.toFixed(1)}"
                    stroke="#c3d9c3" stroke-width="1" stroke-dasharray="4,3"/>`).join('\n')}

                <!-- Area fill -->
                <path d="${areaPath}" fill="url(#chartGrad)"/>

                <!-- Line -->
                <polyline points="${pts}" fill="none" stroke="${color}" stroke-width="2" stroke-linejoin="round" stroke-linecap="round"/>

                <!-- Average line -->
                <line x1="${PAD.left}" y1="${ty(fAvg).toFixed(1)}" x2="${PAD.left + chartW}" y2="${ty(fAvg).toFixed(1)}"
                    stroke="${color}" stroke-width="1" stroke-dasharray="6,4" opacity="0.5"/>
                <text x="${(PAD.left + chartW + 3).toFixed(0)}" y="${(ty(fAvg) + 4).toFixed(0)}"
                    font-size="9" fill="${color}" opacity="0.7">avg</text>

                <!-- Y axis labels -->
                ${yTicks.map(t => `<text x="${(PAD.left - 5).toFixed(0)}" y="${(t.y + 4).toFixed(0)}"
                    text-anchor="end" font-size="10" fill="#4a6b4a">${t.label}</text>`).join('\n')}
                <text x="${(PAD.left - 5).toFixed(0)}" y="${(PAD.top - 4).toFixed(0)}"
                    text-anchor="end" font-size="9" fill="#4a6b4a">t/h</text>

                <!-- X axis tick labels -->
                ${xTicks.map(t => `<line x1="${t.x.toFixed(1)}" y1="${(PAD.top + chartH).toFixed(1)}" x2="${t.x.toFixed(1)}" y2="${(PAD.top + chartH + 5).toFixed(1)}"
                    stroke="#c3d9c3" stroke-width="1"/>
                <text x="${t.x.toFixed(1)}" y="${(PAD.top + chartH + 16).toFixed(0)}"
                    text-anchor="middle" font-size="10" fill="#4a6b4a">${t.label}</text>`).join('\n')}

                <!-- Axes -->
                <line x1="${PAD.left}" y1="${PAD.top}" x2="${PAD.left}" y2="${PAD.top + chartH}"
                    stroke="#c3d9c3" stroke-width="1"/>
                <line x1="${PAD.left}" y1="${PAD.top + chartH}" x2="${PAD.left + chartW}" y2="${PAD.top + chartH}"
                    stroke="#c3d9c3" stroke-width="1"/>
            </svg>`;

            area.innerHTML = `<div class="svg-chart-wrap">${svg}</div>`;
        }

        document.getElementById('history-frente-select').addEventListener('change', renderHistoryChart);

        async function refreshAll() {
            await Promise.all([fetchData(), fetchHistory()]);
        }

        window.addEventListener('load', () => {
            refreshAll();
            setInterval(refreshAll, REFRESH_INTERVAL);
        });
    </script>
</body>
</html>
